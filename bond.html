<!DOCTYPE html>
<html>
<head>
<title>SA Bond Repayment Calculator</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5832272984081813"
     crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>South African Bond Calculator</h1>

<div class="calculator">

<label>Home Loan Amount</label>
<input id="loanAmount" type="number">

<label>Interest Rate %</label>
<input id="interestRate" type="number">

<label>Bond Term (Months)</label>
<input id="loanTerm" type="number">

<button onclick="calculateLoan()">
Calculate Bond Repayment
</button>

<div id="results">
<p id="monthly"></p>
<p id="totalPay"></p>
<p id="interestPaid"></p>
</div>

</div>
